<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🌊 Flood Prediction Form</h1>

            <p class="subtitle">
                Enter the weather details below
            </p>

            {% if error %}
            <p style="color:red;font-weight:bold;text-align:center;">
                {{ error }}
            </p>
            {% endif %}

            <form action="/predict" method="POST">

                <label>Cloud Cover (%)</label>
                <input
                    type="number"
                    step="any"
                    name="cloud_cover"
                    placeholder="Enter Cloud Cover"
                    min="0"
                    max="100"
                    required>

                <label>Annual Rainfall (mm)</label>
                <input
                    type="number"
                    step="any"
                    name="annual"
                    placeholder="Enter Annual Rainfall"
                    required>

                <label>Jan-Feb Rainfall (mm)</label>
                <input
                    type="number"
                    step="any"
                    name="jan_feb"
                    placeholder="Enter Jan-Feb Rainfall"
                    required>

                <label>Mar-May Rainfall (mm)</label>
                <input
                    type="number"
                    step="any"
                    name="mar_may"
                    placeholder="Enter Mar-May Rainfall"
                    required>

                <label>Jun-Sep Rainfall (mm)</label>
                <input
                    type="number"
                    step="any"
                    name="jun_sep"
                    placeholder="Enter Jun-Sep Rainfall"
                    required>

                <br><br>

                <button type="submit" class="btn">
                    Predict Flood
                </button>

                <br><br>

                <a href="/">
                    <button type="button" class="btn back-btn">
                        Back to Home
                    </button>
                </a>

            </form>

        </div>

    </div>

</body>
</html>
